<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      background: #1e293b;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    iframe {
      width: 90%;
      height: 600px;
      border: 3px solid #38bdf8;
      border-radius: 10px;
      margin-top: 10px;
    }

    .btn {
      display: inline-block;
      margin: 15px;
      padding: 12px 20px;
      background: #38bdf8;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

<header>
  📄 My PDF Website
</header>

<div class="container">

  <!-- PDF VIEWER -->
  <iframe src="note.pdf"></iframe>

  <br>

  <!-- OPEN BUTTON -->
  <a class="btn" href="note.pdf" target="_blank">Open PDF</a>

  <!-- DOWNLOAD BUTTON -->
  <a class="btn" href="note.pdf" download>Download PDF</a>

</div>

</body>
</html>
