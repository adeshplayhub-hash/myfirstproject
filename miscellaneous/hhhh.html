<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Very Premium Dashboard - Graph Version</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- Mermaid.js -->
<script type="module" src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs"></script>
<!-- Google Maps -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY"></script>
<!-- SheetJS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {font-family: Arial; background:#020617; color:white; margin:0; padding:20px;}
.container {display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; max-width:1200px; margin:auto;}
.card {background: linear-gradient(135deg,#1e293b,#0f172a); padding:20px; border-radius:20px; transition: transform 0.4s, background 0.6s;}
.card:hover {transform: scale(1.07); background: linear-gradient(135deg,#0f172a,#1e293b);}
.number {font-size:28px; color:#38bdf8; font-weight:bold; transition: all 0.5s;}
button {margin-top:15px; padding:10px 20px; border:none; border-radius:10px; cursor:pointer; background:#38bdf8; color:#000; font-weight:bold; transition: transform 0.3s;}
button:hover {transform: scale(1.05);}
#map {width:100%; height:400px; margin-top:20px; border-radius:15px;}
.flowchart-container {max-width:1200px; margin:auto; margin-top:30px; background:#1e293b; padding:20px; border-radius:15px;}
.mermaid svg {background:#1e293b; border-radius:10px;}
</style>
</head>
<body>
<h1>🚀 Very Premium Dashboard - Graph Version</h1>

<div id="dashboard">
<div class="container">
  <div class="card"><h3>Total Users</h3><div id="users" class="number">0</div></div>
  <div class="card"><h3>Today Views</h3><div id="day" class="number">0</div></div>
  <div class="card"><h3>Total Views</h3><div id="total" class="number">0</div></div>
  <div class="card"><h3>Online Users</h3><div id="online" class="number">0</div></div>
  <div class="card"><h3>Estimated Earnings</h3><div id="earnings" class="number">$0</div></div>
  <div class="card"><h3>Future Prediction</h3><div id="prediction" class="number">0</div></div>
</div>

<button onclick="exportExcel()">📥 Export Excel</button>
<canvas id="lineChart"></canvas>
<canvas id="barChart"></canvas>
<div id="map"></div>
<div class="flowchart-container">
<h2>Live Analytics Flowchart</h2>
<div class="mermaid" id="liveFlowchart"></div>
</div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const today = new Date().toDateString();

function updateRealtimeData(){
  db.ref('analytics').on('value', snap => {
    const data = snap.val() || {users:0,total:0,day:{},online:0,history:[]};
    document.getElementById("users").innerText = data.users;
    document.getElementById("day").innerText = data.day[today]||0;
    document.getElementById("total").innerText = data.total;
    document.getElementById("online").innerText = data.online;
    document.getElementById("earnings").innerText = "$" + (data.total*0.01).toFixed(2);
    document.getElementById("prediction").innerText = Math.round(data.total*1.1);
    drawCharts(data.history || []);
    drawFlowchart(data);
  });
}

function drawCharts(history){
  new Chart(document.getElementById('lineChart'), {
    type:'line',
    data:{labels:history.map((_,i)=>i+1), datasets:[{label:'Views Growth', data:history, borderColor:'#38bdf8', backgroundColor:'rgba(56,189,248,0.2)'}]}
  });
  const todayViews = document.getElementById("day").innerText;
  const totalViews = document.getElementById("total").innerText;
  new Chart(document.getElementById('barChart'), {
    type:'bar',
    data:{labels:['Today','Total'], datasets:[{label:'Views', data:[todayViews,totalViews], backgroundColor:['#22c55e','#3b82f6']}]} 
  });
}

function drawFlowchart(data){
  const chartEl = document.getElementById('liveFlowchart');
  chartEl.innerHTML = `flowchart TD
A[User Visit] --> B{Unique User?}
B -- Yes --> C[Increment Total Users ${data.users||0}]
B -- No --> D[Skip User Count]
C --> E[Update Charts]
E --> F[Update Dashboard Metrics]`
  mermaid.init(undefined, chartEl);
}

function initMap(){
  const map = new google.maps.Map(document.getElementById('map'), {zoom:2, center:{lat:20,lng:0}});
  db.ref('locations').on('value', snap=>{
    const locs = snap.val() || {};
    for(let k in locs){
      new google.maps.Marker({position:{lat:locs[k].lat,lng:locs[k].lng}, map:map, title:locs[k].city+', '+locs[k].country});
    }
  });
}

function exportExcel(){
  db.ref('analytics').once('value').then(snap=>{
    const data = snap.val();
    const ws = XLSX.utils.json_to_sheet([data]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Analytics");
    XLSX.writeFile(wb, "analytics.xlsx");
  });
}

mermaid.initialize({startOnLoad:true});
updateRealtimeData();
initMap();
</script>
</body>
</html>
