<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    padding:30px;
    display:flex;
    justify-content:center;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
    width:100%;
    max-width:1200px;
}

/* CARD */
.card{
    position:relative;
    aspect-ratio:9/16;
    overflow:hidden;
    border-radius:20px;
    cursor:pointer;
    transition:0.4s;
}


/* Animated text */
#lightbox-text{
    color:white;
    font-size:28px;
    text-align:center;
    animation:fadeZoom 0.6s ease;
    max-width:80%;
}

@keyframes fadeZoom{
    from{
        opacity:0;
        transform:scale(0.5);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* RGB BORDER */
.card::before{
    content:"";
    position:absolute;
    inset:-20px;
    background:conic-gradient(
        red,orange,yellow,lime,cyan,blue,magenta,red
    );
    animation:rotate 4s linear infinite;
    border-radius:22px;
    z-index:-1;
}

.card::after{
    content:"";
    position:absolute;
    inset:3px;
    background:#0f172a;
    border-radius:18px;
    z-index:-1;
}

.card:hover{
    transform:scale(1.05);
}

/* IMAGE */
.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:18px;
}

/* OVERLAY */
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    padding:15px;
    background:linear-gradient(transparent,rgba(0,0,0,0.8));
    color:rgb(237, 238, 255);
}

/* LIGHTBOX */
.lightbox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

.lightbox img{
    max-width:90%;
    max-height:80%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:35px;
    color:white;
    cursor:pointer;
}

.nav{
    position:absolute;
    top:50%;
    width:100%;
    display:flex;
    justify-content:space-between;
    color:white;
    font-size:40px;
    cursor:pointer;
    padding:0 20px;
}

@keyframes rotate{
    to{transform:rotate(360deg);}
}
</style>
</head>
