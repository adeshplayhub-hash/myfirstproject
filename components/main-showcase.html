<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Inter",sans-serif;}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:#e9e9e9;
  font-family:"Inter",sans-serif;
}
/* CONTAINER */
.container1{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:30px;
  padding:60px;
}

/* ROW */
.row{
  display:flex;
  gap:30px;
  justify-content:center;
}

/* CARD */
.card1{
  width:420px;
  height:250px;
  border-radius:20px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

/* INNER */
.card-content1{
  position:relative;
  width:100%;
  height:100%;
}

/* IMAGE */
.card1 img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.5s;
}

/* OVERLAY */
.overlay1{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  padding:20px;
  background:linear-gradient(to top, rgba(255, 14, 14, 0.9), transparent);
}

/* TEXT */
.title1{
  font-size:18px;
  opacity:0;
  transform:translateY(20px);
  transition:0.3s;
}

/* BUTTON */
.btn1{
  padding:8px 14px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.1);
  color:#fff;
  text-decoration:none;
  transition:0.3s;
 
}

/* HOVER */
.card1:hover img{transform:scale(1.2);}
.card1:hover .title1{opacity:1;transform:translateY(0);}
.card1:hover .btn1{background:#fff;color:#000;}
.card1:hover{transform:scale(1.05);}

<script>
// TRIANGLE LAYOUT
const container = document.getElementById("container");
const cards = Array.from(container.children);

container.innerHTML = "";

let rowSize = 3;
let index = 0;

while(index < cards.length){
  const row = document.createElement("div");
  row.className = "row";

  for(let i=0;i<rowSize && index<cards.length;i++){
    row.appendChild(cards[index]);
    index++;
  }

  container.appendChild(row);

  rowSize--;
  if(rowSize===0) rowSize=3;
}

// 3D EFFECT
document.querySelectorAll(".card1").forEach(card=>{
  card.addEventListener("mousemove", e=>{
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const rotateX = ((y / rect.height) - 0.5) * 10;
    const rotateY = ((x / rect.width) - 0.5) * -10;

    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  });

  card.addEventListener("mouseleave", ()=>{
    card.style.transform = "rotateX(0) rotateY(0)";
  });
});
</script>
